name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: |
          dotnet restore src/ElBruno.Whisper/ElBruno.Whisper.csproj -p:TargetFrameworks=net8.0
          dotnet restore src/tests/ElBruno.Whisper.Tests/ElBruno.Whisper.Tests.csproj -p:TargetFrameworks=net8.0

      - name: Build
        run: |
          dotnet build src/ElBruno.Whisper/ElBruno.Whisper.csproj --no-restore -p:TargetFrameworks=net8.0
          dotnet build src/tests/ElBruno.Whisper.Tests/ElBruno.Whisper.Tests.csproj --no-restore -p:TargetFrameworks=net8.0

      - name: Test
        run: dotnet test src/tests/ElBruno.Whisper.Tests/ElBruno.Whisper.Tests.csproj --no-build --framework net8.0 --verbosity normal --filter "Category!=Integration" --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/test-results.trx"
