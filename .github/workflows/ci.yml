name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ElBruno.Whisper.slnx -p:TargetFrameworks=net8.0

      - name: Build
        run: dotnet build ElBruno.Whisper.slnx --no-restore -p:TargetFrameworks=net8.0 -c Release

      - name: Test
        run: dotnet test ElBruno.Whisper.slnx --no-build --framework net8.0 --verbosity normal --logger "trx;LogFileName=test-results.trx" -c Release

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/test-results.trx"
